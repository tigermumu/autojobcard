//妫�鏌ュ瘑鐮佷笉鑳藉寘鍚�涓変釜杩炵画鏁板瓧
function checkCharAt(pwVal) {
	var flag = true;
	var arr = pwVal.split("");
	if (arr && arr.length > 0) {
		for (var i = 1; i < arr.length-1; i++) {
		    var previousIndex = arr[i-1].charCodeAt();
		    var nextIndex = arr[i+1].charCodeAt();
		    var currentIndex = arr[i].charCodeAt();
		    
			if (currentIndex == previousIndex + 1 && currentIndex == nextIndex - 1) {
		        flag = false;
		    }
		}
	}
	return flag;
}
