			add_saml_auth_iframe = function(realm)
{

	var resizeiFrame = function() {
		var content = iFrame.contentDocument || iFrame.contentWindow.document;
		if(!content){console.log("problem with IDP content loading");}
		var idpButtons = content.getElementById(iframeId);
		if(!idpButtons){console.log("problem with IDP content loading");}
		
		function getDocHeight() {//Get document height (cross-browser)
			var D = content;	
			return Math.max(
				D.body.scrollHeight, D.documentElement.scrollHeight,
				D.body.offsetHeight, D.documentElement.offsetHeight,
				D.body.clientHeight, D.documentElement.clientHeight
			);
		}
		iFrame.width  = idpButtons.scrollWidth;
		iFrame.height = getDocHeight();
	};

	var samlDiv = document.getElementById('LoginSaml');
	if(!samlDiv){console.log("problem with saml div loading");}
	
	var iframeId = 'saml_iframe';
	var old_iframe = document.getElementById(iframeId);
	if (old_iframe != null) {
		old_iframe.parentNode.removeChild(old_iframe);
		old_iframe = null;
	}
	
	var iFrame = document.createElement('iframe');
	iFrame.id = iframeId;
	iFrame.src = "spPortal/IdentityProviders?Realm="+encodeURIComponent(realm);
	if (iFrame.addEventListener){
		iFrame.addEventListener('load', resizeiFrame, false);
	}else {
		iFrame.attachEvent("onload", resizeiFrame);
	}
	iFrame.frameBorder = 0;
	iFrame.scrolling = "no";
	iFrame.textContent = "Your browser doesn't support the iframe tag.";
	samlDiv.appendChild(iFrame);
	
	//load logic of handleMessage into the window
	load_saml_auth_events_handeling();
}

load_saml_auth_events_handeling = function()
{
	//get notification about authentication with saml
	function handleMessage(event) {
		
		if (event.origin != "https://vpn.gameco.com.cn") 
		{
			if (typeof console === 'undefined') {						
			} else {
				console.log("SAML authentication: Domain mismatch");
			}
			return; 
		}
		var dataFromChildIframe = event.data;
		if (typeof console === 'undefined') {						
		} else {
			console.log("got message: "+ dataFromChildIframe);
		}
		var samlprefix = "saml:";
		if(dataFromChildIframe.indexOf(samlprefix)===0)
		{
			dataFromChildIframe = dataFromChildIframe.substring(samlprefix.length);
			if (typeof console === 'undefined') {						
			} else {
				console.log("Navigating to: " + dataFromChildIframe);
			}
			window.location = dataFromChildIframe;
		}
		else
		{
			if (typeof console === 'undefined') {						
			} else {
				console.log("Ignoring message: " + dataFromChildIframe);
			}
		}	
	}

	if (window.addEventListener) {
	window.addEventListener("message", handleMessage);	
	} else {
		window.attachEvent("onmessage", handleMessage);
	}
}

			function showLoginForm(selectedRealm)
			{
				resizeToNormal();
				authType = getFirstAuthType(selectedRealm);

				// console.log("authType = " + authType);
				
				// Adjust login form
				switch(authType)
				{
					case 2:
					case 4:
					case 5:
						showUserPasswordForm();
					break;
					
					case 7:
						showKeyfobForm();
					break;
					
					case 3: 
						showCertificateForm();
					break;
					
					case 8:
						showSamlForm();
					break;
					
					case 1: 
					default:
						showCertificateOrUserPasswordForm();
					break;
				}
			}

			{
				if(label.length > 80)

			}
			
			function updateRealmView()

			function loadCaptchaSrc()
			{
								var script = document.createElement("script"); // Make a script DOM node
			
				script.src = 'https://www.google.com/recaptcha/api.js?hl='+'en'+'&onload=onCaptchaLoadCB&render=explicit'; 
				document.head.appendChild(script); 
				setTimeout(function(){
					if(GetObj("reCaptcha-div").style.display == "none")
					{
						document.getElementById("loadingDiv").style["display"] = "block";
					setTimeout(function(){
							if(GetObj("reCaptcha-div").style.display == "none")
							{
							document.getElementById("loadingDiv").style["display"] = "none";
							var recaptchaDiv = GetObj("reCaptcha-div");
							recaptchaDiv.style.display = "block";
							recaptchaDiv.innerHTML = '<span class = \'errorMessage\'>' + 'Loading CAPTCHA challenge took too long, check your connectivity with google and try again.' +'</span>';
							}
						}, 10000);
					}
				}, 500);
				
			}
			
			function onCaptchaLoadCB ()
			{
				document.getElementById("loadingDiv").style["display"] = "none";
				document.getElementById("reCaptcha-div").style["display"] = "block";
				grecaptcha.render('reCaptcha-div', {
				    'sitekey': '',
				    'callback': onCaptchaChallengeComplete
				});
			}
